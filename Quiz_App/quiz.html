<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App</title>
    <link rel="stylesheet" href="quiz.css">
</head>
<body>

    <div class="quiz-container">
        <h2 class="quiz-question">
            Question Tag
        </h2>
          
        <ul>
            <li>
                <input type="radio" name="option" id="option-a" class="answer">
                <label for="option-a" class="text-option-a">Option A</label>
            </li>
            <li>
                <input type="radio" name="option" id="option-b" class="answer">
                <label for="option-b" class="text-option-b">Option B</label>
            </li>
            <li>
                <input type="radio" name="option" id="option-c" class="answer">
                <label for="option-c" class="text-option-c">Option C</label>
            </li>
            <li>
                <input type="radio" name="option" id="option-d" class="answer">
                <label for="option-d" class="text-option-d">Option D</label>
            </li>


        </ul>

        <button id="submit">Submit</button>
    </div>
    
    <script src="quiz.js"></script>
</body>
</html>
