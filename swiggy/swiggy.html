<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@100;200;300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bevan:ital@0;1&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Odor+Mean+Chey&family=Rubik+Distressed&display=swap" rel="stylesheet">
</head>
<body>
    <header>
     <div class="Header_container">
         <div class="logo">
            <img src="swiggy_images.svg" alt="">
         </div>

         <div class="location">
            <img src="location.svg" alt="">
            <p>setup your location</p>
         </div>
       
         <div class="searchbar">
            <div class="serachbox">
            <input type="text" placeholder="Search for Restaurant and Food">
           </div>
            <div class="search_logo">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
         </div>

         <div class="user_logo">
            <img src="userlogo.svg" alt="">
         </div>

     </div>
     <div class="head_content">
          <div class="head_text">
        <p>Order Food</p>
        <p>Online In Delhi</p>
          </div>

          <div class="head_food">
            <img src="dweb_header.avif" alt="">
          </div>
     </div>

     
     <div class="head_item_para">
      <p>What's on your mind</p>
     </div>
     <div class="head_item">
      <div class="head_item_box">
         <img src="northindian.jpeg" alt="north indian Food image">
      </div>

      <div class="head_item_box">
         <img src="Biryani.jpeg" alt="Biryani indian Food image">
      </div>

      <div class="head_item_box">
         <img src="burger.jpeg" alt="burger indian Food image">
      </div>

      <div class="head_item_box">
         <img src="southindian.jpeg" alt="South indian Food image">
      </div>

      <div class="head_item_box">
         <img src="Rolls.jpeg" alt="Rolls image">
      </div>

      <div class="head_item_box">
         <img src="pizza.jpeg" alt="pizza image">
      </div>

      <div class="head_item_box">
         <img src="poori.jpeg" alt="puri image">
      </div>
     </div>
    </header>


   
</body>
</html>
