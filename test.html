<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Type-It Effect</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }

        .hero-section-sub-heading {
            font-size: 24px;
            color: #333;
        }

        .role {
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="hero-section-sub-heading">
        I am a <span class="role"></span>
    </div>

    <script>
        const roles = ["Web Developer", "Designer", "Engineer", "Creator"];
        const roleElement = document.querySelector(".role");
        let roleIndex = 0;
        let charIndex = 0;

        function typeRole() {
            if (charIndex < roles[roleIndex].length) {
                roleElement.textContent += roles[roleIndex].charAt(charIndex);
                charIndex++;
                setTimeout(typeRole, 100); // Adjust typing speed
            } else {
                setTimeout(deleteRole, 1500); // Pause before deleting
            }
        }

        function deleteRole() {
            if (charIndex > 0) {
                roleElement.textContent = roles[roleIndex].substring(0, charIndex - 1);
                charIndex--;
                setTimeout(deleteRole, 50); // Adjust deleting speed
            } else {
                roleIndex = (roleIndex + 1) % roles.length; // Loop through roles
                setTimeout(typeRole, 500); // Pause before typing next role
            }
        }

        // Start typing effect
        typeRole();
    </script>
</body>
</html>
