<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy Birthday, Abhishek!</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="main-container">
    <div class="content">
      <h1 class="title">🎉 Happy Birthday, Abhishek! 🎉</h1>
      <p class="message">May your day be as bright as your smile and filled with love and joy!</p>
      <button id="playMusic" class="btn">Play Birthday Song 🎶</button>
    </div>

    <div class="animation">
      <div class="balloon"></div>
      <div class="balloon"></div>
      <div class="balloon"></div>
      <div class="balloon"></div>
    </div>

    <div class="photo-upload">
      <h2>🎂 Your Picture Here!</h2>
      <input type="file" id="uploadPhoto" accept="image/*">
      <img id="photoPreview" src="" alt="Your uploaded photo" class="photo">
    </div>

    <div class="carousel">
      <h2>🌟 Birthday Wishes 🌟</h2>
      <div class="carousel-container">
        <div class="wish">"Have an amazing year ahead, Abhishek!"</div>
        <div class="wish">"Keep shining like the star you are!"</div>
        <div class="wish">"Enjoy every moment of your special day!"</div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
