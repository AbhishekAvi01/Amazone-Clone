<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details Form</title>
    
</head>
<body>
    <h1>Student Details Form</h1>
    <form id="studentForm">
        <div class="form-control">
            <label for="name">Student Name:</label>
            <input type="text" id="name" placeholder="Enter name" required>
        </div>
        <div class="form-control">
            <label for="age">Age:</label>
            <input type="number" id="age" placeholder="Enter age" required>
        </div>
        <div class="form-control">
            <label for="rollNumber">Roll Number:</label>
            <input type="text" id="rollNumber" placeholder="Enter roll number" required>
        </div>
        <div class="form-control">
            <label for="marks">Marks:</label>
            <input type="number" id="marks" placeholder="Enter marks" required>
        </div>
        <button type="button" onclick="submitStudentDetails()">Submit</button>
    </form>
    <div class="output" id="output"></div>

    <script>
        function submitStudentDetails() {
            // Capturing input values
            const name = document.getElementById('name').value;
            const age = document.getElementById('age').value;
            const rollNumber = document.getElementById('rollNumber').value;
            const marks = document.getElementById('marks').value;

            // Creating a student object
            const student = {
                name: name,
                age: age,
                rollNumber: rollNumber,
                marks: marks
            };

            // Displaying the student details
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = `
                <h2>Student Details</h2>
                <p><strong>Name:</strong> ${student.name}</p>
                <p><strong>Age:</strong> ${student.age}</p>
                <p><strong>Roll Number:</strong> ${student.rollNumber}</p>
                <p><strong>Marks:</strong> ${student.marks}</p>
            `;
        }
    </script>
</body>
</html>
