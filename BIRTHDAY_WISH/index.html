<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aryan Abhishek's Birthday Wish</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Happy Birthday, Aryan Abhishek! 🎉</h1>
        </div>
        <div class="photo">
            <img src="mypic.jpg" alt="Aryan Abhishek">
        </div>
        <div class="message">
            <p>Wishing you a day filled with love, joy, and endless happiness. Have an amazing year ahead! 🎂</p>
        </div>
        <div class="animation">
            <button onclick="playAnimation()">Click to Celebrate! 🎊</button>
            <div class="confetti" id="confetti"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
