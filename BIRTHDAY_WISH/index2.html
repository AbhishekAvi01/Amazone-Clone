<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday Aryan Abhishek</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="background">
        <img src="mypic.jpg" alt="Happy Birthday Poster">
    </div>

    <div class="container">
        <div class="header">
            <h1>Happy Birthday, Aryan Abhishek! 🎉🎂</h1>
        </div>

        <div class="photo">
            <img src="mypic.jpg" alt="Aryan Abhishek">
        </div>

        <div class="cake">
            <div class="plate"></div>
            <div class="cake-layer">
                <div class="candle">
                    <div class="flame"></div>
                </div>
                <div class="candle">
                    <div class="flame"></div>
                </div>
                <div class="candle">
                    <div class="flame"></div>
                </div>
            </div>
        </div>

        <div class="message">
            <p>May your birthday be as amazing as you are. Have a fantastic day! 🎂✨</p>
        </div>

        <div class="animation">
            <button onclick="playAnimation()">Click to Celebrate! 🎊</button>
        </div>

        <div class="hearts" id="hearts"></div>
        <div class="confetti" id="confetti"></div>
    </div>

    <script src="script2.js"></script>
</body>
</html>
